<!doctype html>
<html lang="en" data-theme="pi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>pi UI</title>
    <meta
      name="description"
      content="A low-footprint PWA for the pi coding agent."
    />
    <meta name="application-name" content="pi UI" />
    <meta name="color-scheme" content="dark" />
    <meta name="format-detection" content="telephone=no" />

    <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="%sveltekit.assets%/pwa-192x192.png" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />

    <meta name="theme-color" content="#16151b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="pi UI" />
    <meta name="msapplication-TileColor" content="#16151b" />

    <meta property="og:title" content="pi UI" />
    <meta property="og:description" content="A low-footprint PWA for the pi coding agent." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="%sveltekit.assets%/pwa-512x512.png" />
    <meta name="twitter:card" content="summary" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
